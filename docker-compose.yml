services:
  postgres:
    image: postgres:16
    container_name: hondago-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hondago}
      POSTGRES_USER: ${POSTGRES_USER:-hondago}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: America/Fortaleza
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hondago} -d ${POSTGRES_DB:-hondago}"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: hondago-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
